# Nori local services registry
#
# Copy to ~/.nori/local-services.yml and edit paths to match your workspace.
#   mkdir -p ~/.nori
#   cp configs/local-services.yml ~/.nori/local-services.yml
#
# Used by `just services` across Nori repos.
# See: docs/specs/shared-local-runner-layer.md

services:
  skillsets-cli:
    repo: skillsets
    cwd: $NORI_ROOT/skillsets
    role: skillsets cli tool
    start_cmd: npm run dev

  handroll:
    repo: sessions
    cwd: $NORI_ROOT/sessions
    role: local handroll cli
    start_cmd: cargo run -p nori-handroll --

  broker-server:
    repo: sessions
    cwd: $NORI_ROOT/sessions/broker/server
    role: local broker api
    start_cmd: cd broker/server && bun run src/main.ts
    default_port: 3001

  broker-ui:
    repo: sessions
    cwd: $NORI_ROOT/sessions/broker/ui
    role: local broker ui
    start_cmd: cd broker/ui && npm run dev
    default_port: 5173

  registrar-server:
    repo: registrar
    cwd: $NORI_ROOT/registrar/server
    role: local registrar api
    start_cmd: cd server && npm start

  registrar-ui:
    repo: registrar
    cwd: $NORI_ROOT/registrar/ui
    role: local registrar ui
    start_cmd: cd ui && npm run dev

  admin-cli:
    repo: admin
    cwd: $NORI_ROOT/admin
    role: admin cli tool
    start_cmd: npm run dev

  watchtower-server:
    repo: watchtower
    cwd: $NORI_ROOT/watchtower/server
    role: watchtower api server
    start_cmd: cd server && npm start

  watchtower-ui:
    repo: watchtower
    cwd: $NORI_ROOT/watchtower/ui
    role: watchtower dashboard ui
    start_cmd: cd ui && npm run dev
