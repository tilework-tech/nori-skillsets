# Auto-deploy @next on every push to main
#
# Publishes a new @next prerelease version to npm whenever code lands on main
# (merged PRs or direct pushes). Uses cancel-in-progress so only the latest
# push matters if multiple merge in quick succession.
#
name: Auto @next Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

concurrency:
  group: auto-next-deploy
  cancel-in-progress: true

jobs:
  publish-next:
    uses: ./.github/workflows/skillsets-release.yml
    with:
      publish_next: true
      dry_run: false
